name: CI

# Runs the dependency-free test suite (no npm install needed) on every push/PR.
on:
  push:
    branches: ['**']
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Validate drill specs (JSON schema + engine vocabulary)
        run: node test/validate-specs.mjs

      - name: Drill parity (archetype-built vs legacy reference)
        run: node test/parity.mjs

      - name: HTML lint (no duplicate ids)
        run: node test/lint-html.mjs
