name: Deploy to GitHub Pages

# Publishes the static site (index.html) to GitHub Pages.
# Runs on every push to the default branch, and can be triggered manually.
on:
  push:
    branches: [main]
  workflow_dispatch:

# Permissions the GITHUB_TOKEN needs to deploy Pages.
permissions:
  contents: read
  pages: write
  id-token: write

# Allow one concurrent deployment; don't cancel an in-progress run.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # enablement: true turns Pages on automatically the first time this runs,
      # so no manual toggle in repo Settings is required.
      - name: Configure Pages
        uses: actions/configure-pages@v5
        with:
          enablement: true

      # Upload the whole repo root; it's a single static index.html.
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: .

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
